name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Build instalador Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Renomear instalador
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist -Filter "*.exe" | Where-Object { $_.Name -notlike "*.blockmap" } | Select-Object -First 1
          Copy-Item $exe.FullName "dist\HelpGames.Blocker.Setup.exe"
          Write-Host "Instalador: $($exe.Name) → HelpGames.Blocker.Setup.exe"

      - name: Publicar release "latest"
        shell: bash
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest "dist/HelpGames.Blocker.Setup.exe" \
            --title "HelpGames Blocker – Versão Mais Recente" \
            --notes "Construído automaticamente a partir do branch main." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
