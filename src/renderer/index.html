<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://helpgames.pt https://helpgames-production.up.railway.app;">
  <title>HelpGames Blocker – Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 340px;
      background: rgba(30,41,59,0.8);
      border: 1px solid rgba(148,163,184,0.15);
      border-radius: 16px;
      padding: 32px;
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg,#3b82f6,#8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo h1 { font-size: 17px; font-weight: 700; color: #f1f5f9; }
    .logo p  { font-size: 11px; color: #64748b; }

    h2 { font-size: 18px; color: #f1f5f9; margin-bottom: 6px; }
    .subtitle { font-size: 12px; color: #94a3b8; margin-bottom: 22px; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 12px;
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 8px; color: #f1f5f9; font-size: 13px;
    }
    input:focus { outline: none; border-color: #3b82f6; }

    .error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 8px 12px;
      color: #fca5a5; font-size: 12px;
      margin-bottom: 14px; display: none;
    }
    .error.show { display: block; }

    .btn {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg,#3b82f6,#8b5cf6);
      border: none; border-radius: 8px;
      color: white; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .footer {
      margin-top: 16px; text-align: center;
      font-size: 11px; color: #64748b;
    }
    .footer a { color: #3b82f6; text-decoration: none; cursor: pointer; }

    .info {
      margin-top: 16px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 8px; padding: 10px 12px;
      font-size: 11px; color: #93c5fd; line-height: 1.5;
    }

    .loading { text-align: center; padding: 20px 0; display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(148,163,184,0.2);
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 13px; color: #94a3b8; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div>
      <h1>HelpGames Blocker</h1>
      <p>Proteção contra apostas</p>
    </div>
  </div>

  <div id="formSection">
    <h2>Entrar</h2>
    <p class="subtitle">Liga a tua conta para activar a protecção</p>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="o.teu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Palavra-passe</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="submitBtn">Entrar e Activar</button>
    </form>

    <div class="footer">
      Sem conta? <a id="registerLink">Criar conta em helpgames.pt</a>
    </div>

    <div class="info">
      ℹ️ Após o login, o app fica em background na bandeja do sistema. O bloqueio é activado pelo dashboard web.
    </div>
  </div>

  <div class="loading" id="loadingSection">
    <div class="spinner"></div>
    <p>A ligar à conta...</p>
  </div>
</div>

<script>
  const form        = document.getElementById('loginForm');
  const errorMsg    = document.getElementById('errorMsg');
  const submitBtn   = document.getElementById('submitBtn');
  const formSection = document.getElementById('formSection');
  const loadingSection = document.getElementById('loadingSection');

  document.getElementById('registerLink').addEventListener('click', () => {
    window.electronAPI.openWebDashboard();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('show');
    errorMsg.textContent = '';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    submitBtn.disabled = true;
    formSection.classList.add('hidden');
    loadingSection.style.display = 'block';

    const result = await window.electronAPI.login({ email, password });

    if (result.success) {
      // Janela fecha automaticamente pelo main process
      loadingSection.querySelector('p').textContent = '✅ Login efectuado!';
    } else {
      loadingSection.style.display = 'none';
      formSection.classList.remove('hidden');
      submitBtn.disabled = false;
      errorMsg.textContent = result.error || 'Email ou palavra-passe incorrectos';
      errorMsg.classList.add('show');
    }
  });
</script>
</body>
</html>
